---
- name: Create a external-secrets namespace
  kubernetes.core.k8s:
    name: external-secrets
    api_version: v1
    kind: Namespace
    state: present
    kubeconfig: "{{ kubeconfig_path | default(omit) }}"
  delegate_to: "{{ 'localhost' if delegate_local else inventory_hostname }}"
    
- name: Add webhook-credentials to external-secrets
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ kubeconfig_path | default(omit) }}"
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: webhook-credentials
        namespace: external-secrets
        labels:
          external-secrets.io/type: webhook
      stringData:
        username: "{{ external_secrets_user }}"
        password: "{{ external_secrets_pass }}"
  delegate_to: "{{ 'localhost' if delegate_local else inventory_hostname }}"